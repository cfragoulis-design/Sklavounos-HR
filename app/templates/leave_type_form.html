{% extends "base.html" %}
{% block content %}
<div class="topbar">
  <div>
    <h1>{{ "Νέος τύπος άδειας" if not leave_type else "Επεξεργασία τύπου άδειας" }}</h1>
  </div>
</div>

<div class="card form-card">
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}

  <form method="post" action="{{ '/leave-types/new' if not leave_type else '/leave-types/' ~ leave_type.id ~ '/edit' }}">
    <div class="form-grid">
      <div class="field">
        <label>Code</label>
        <input type="text" name="code" value="{{ leave_type.code if leave_type else '' }}" placeholder="ANNUAL_LEAVE">
      </div>

      <div class="field">
        <label>Όνομα</label>
        <input type="text" name="name" value="{{ leave_type.name if leave_type else '' }}" required>
      </div>

      <div class="field">
        <label>Χρώμα</label>
        <input type="color" name="color" value="{{ leave_type.color if leave_type else '#2563eb' }}">
      </div>
    </div>

    <div class="checkbox-row">
      <label><input type="checkbox" name="counts_against_balance" {% if not leave_type or leave_type.counts_against_balance %}checked{% endif %}> Μετράει στο υπόλοιπο άδειας</label>
    </div>

    <div class="checkbox-row">
      <label><input type="checkbox" name="is_active" {% if not leave_type or leave_type.is_active %}checked{% endif %}> Ενεργός</label>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Αποθήκευση</button>
      <a class="btn btn-secondary" href="/leave-types">Ακύρωση</a>
    </div>
  </form>
</div>
{% endblock %}
